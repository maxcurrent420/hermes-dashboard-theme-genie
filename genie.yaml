name: genie
label: Genie
description: Mystical djinn theme with blue and gold accents, smoke wisps.

palette:
  background:
    hex: "#0a1428"
    alpha: 1.0
  midground: "#e8d5b7"
  foreground:
    hex: "#f4d03f"
    alpha: 0.95
  warmGlow: "rgba(255, 215, 0, 0.15)"
  noiseOpacity: 0.4


typography:
  fontSans: '"Cinzel", "Playfair Display", Georgia, serif'
  fontMono: '"JetBrains Mono", "Fira Code", monospace'
  fontDisplay: '"Cinzel", serif'
  fontUrl: "https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
  baseSize: "15px"
  lineHeight: "1.6"
  letterSpacing: "0.02em"

layout:
  radius: "0.5rem"
  density: comfortable

colorOverrides:
  primary: "#f4d03f"
  primaryForeground: "#0a1428"
  accent: "#4fc3f7"
  ring: "#4fc3f7"
  border: "rgba(79, 195, 247, 0.25)"
  secondary: "#1565c0"
  muted: "rgba(244, 208, 63, 0.15)"
  mutedForeground: "#90caf9"

assets:
  bg: "data:image/png;base64,"

componentStyles:
  backdrop:
    fillerOpacity: "0.2"
    fillerBlendMode: "normal"
    backgroundSize: "auto 100vh"
    backgroundPosition: "center"

customCSS: |
  :root {
    --smoke-img: url("data:image/png;base64,");
  }
  
  /* Golden glow on primary elements */
  .btn-primary, [data-state="selected"] {
    box-shadow: 0 0 20px rgba(244, 208, 63, 0.4),
              inset 0 1px 0 rgba(255, 255, 255, 0.2);
  }
  
  /* Subtle shimmer on cards */
  .card {
    background: linear-gradient(
      135deg,
      rgba(10, 20, 40, 0.9) 0%,
      rgba(21, 101, 192, 0.15) 50%,
      rgba(10, 20, 40, 0.9) 100%
    );
  }
  
  /* Golden text glow */
  h1, h2, h3, .font-display {
    text-shadow: 0 0 30px rgba(244, 208, 63, 0.3);
  }
  
  /* Floating animation */
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }
  
  .animate-float {
    animation: float 4s ease-in-out infinite;
  }
  
  /* Randomized smoke wisps - 3 positions, varying sizes by ±20% */
  
  /* Smoke wisp 1 - left position, base size 250px */
  body::before {
    content: "";
    position: fixed;
    bottom: -200px;
    left: 12%;
    width: 250px;
    height: 250px;
    margin-left: -125px;
    pointer-events: none;
    z-index: 9998;
    opacity: 0;
    background: var(--smoke-img) no-repeat center;
    background-size: contain;
    filter: sepia(1) saturate(5) hue-rotate(-20deg) brightness(1.1);
    animation: smokeRise1 6s ease-in infinite;
    animation-delay: 0s;
  }
  
  /* Smoke wisp 2 - center-right position, 20% larger (300px) */
  body::after {
    content: "";
    position: fixed;
    bottom: -200px;
    left: 45%;
    width: 300px;
    height: 300px;
    margin-left: -150px;
    pointer-events: none;
    z-index: 9998;
    opacity: 0;
    background: var(--smoke-img) no-repeat center;
    background-size: contain;
    filter: sepia(1) saturate(4) hue-rotate(-15deg) brightness(1.2);
    animation: smokeRise2 7s ease-in infinite;
    animation-delay: -3s;
  }
  
  /* Additional randomized smoke wisps via real DOM elements */
  /* Target header, aside, footer - each gets ::before and ::after for smoke */

  header::after {
    content: "";
    position: fixed;
    bottom: -200px;
    left: 25%;
    width: 220px;
    height: 220px;
    margin-left: -110px;
    pointer-events: none;
    z-index: 9998;
    opacity: 0;
    background: var(--smoke-img) no-repeat center;
    background-size: contain;
    filter: sepia(1) saturate(3.5) hue-rotate(-10deg) brightness(1.3);
    animation: smokeRise3 6s ease-in infinite;
    animation-delay: -2.5s;
  }

  aside::before {
    content: "";
    position: fixed;
    bottom: -200px;
    left: 60%;
    width: 280px;
    height: 280px;
    margin-left: -140px;
    pointer-events: none;
    z-index: 9998;
    opacity: 0;
    background: var(--smoke-img) no-repeat center;
    background-size: contain;
    filter: hue-rotate(150deg) brightness(1.8) saturate(2);
    animation: smokeRise4 7s ease-in infinite;
    animation-delay: -4s;
  }

  aside::after {
    content: "";
    position: fixed;
    bottom: -200px;
    left: 78%;
    width: 240px;
    height: 240px;
    margin-left: -120px;
    pointer-events: none;
    z-index: 9998;
    opacity: 0;
    background: var(--smoke-img) no-repeat center;
    background-size: contain;
    filter: hue-rotate(170deg) brightness(1.6) saturate(1.8);
    animation: smokeRise5 6.5s ease-in infinite;
    animation-delay: -3.5s;
  }


  @keyframes smokeRise2 {
    0% {
      opacity: 0;
      bottom: -200px;
      transform: scale(1) rotateZ(0deg);
    }
    15% {
      opacity: 0.9;
    }
    50% {
      opacity: 0.6;
    }
    90% {
      bottom: 65%;
      opacity: 0.3;
      transform: scale(2.5) rotateZ(15deg);
    }
    100% {
      bottom: 70%;
      opacity: 0;
      transform: scale(3) rotateZ(20deg);
    }
  }

  @keyframes smokeRise1 {
    0% {
      opacity: 0;
      bottom: -200px;
      transform: scale(1) rotateZ(0deg);
    }
    15% {
      opacity: 0.9;
    }
    50% {
      opacity: 0.7;
    }
    90% {
      bottom: 65%;
      opacity: 0.4;
      transform: scale(2.7) rotateZ(18deg);
    }
    100% {
      bottom: 70%;
      opacity: 0;
      transform: scale(3) rotateZ(20deg);
    }
  }

  @keyframes smokeRise3 {
    0% {
      opacity: 0;
      bottom: -200px;
      transform: scale(1) rotateZ(0deg);
    }
    15% {
      opacity: 0.8;
    }
    50% {
      opacity: 0.6;
    }
    90% {
      bottom: 60%;
      opacity: 0.3;
      transform: scale(2.2) rotateZ(-10deg);
    }
    100% {
      bottom: 65%;
      opacity: 0;
      transform: scale(2.6) rotateZ(-15deg);
    }
  }

  @keyframes smokeRise4 {
    0% {
      opacity: 0;
      bottom: -200px;
      transform: scale(1) rotateZ(0deg);
    }
    15% {
      opacity: 0.85;
    }
    50% {
      opacity: 0.5;
    }
    90% {
      bottom: 55%;
      opacity: 0.2;
      transform: scale(2.8) rotateZ(25deg);
    }
    100% {
      bottom: 60%;
      opacity: 0;
      transform: scale(3.2) rotateZ(30deg);
    }
  }

  @keyframes smokeRise5 {
    0% {
      opacity: 0;
      bottom: -200px;
      transform: scale(1) rotateZ(0deg);
    }
    15% {
      opacity: 0.95;
    }
    50% {
      opacity: 0.65;
    }
    90% {
      bottom: 70%;
      opacity: 0.35;
      transform: scale(2.3) rotateZ(-20deg);
    }
    100% {
      bottom: 75%;
      opacity: 0;
      transform: scale(2.5) rotateZ(-25deg);
    }
  }
